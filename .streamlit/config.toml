[theme]
base = "light"
primaryColor = "#3B82F6"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F9FAFB"
textColor = "#1F2937"
font = "sans serif"

[client]
showErrorDetails = false

[browser]
gatherUsageStats = false

[server]
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false
